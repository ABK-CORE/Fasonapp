<h3 class="mb-3">Fason Rapor Tarih Bazlı</h3>

<div class="mb-3 d-flex align-items-end gap-3">
  <div>
    <label for="baslamaTarihi" class="form-label">Başlama Tarihi</label>
    <input id="baslamaTarihi" type="date" class="form-control" [(ngModel)]="baslamaTarihi">
  </div>
  <div>
    <label for="bitisTarihi" class="form-label">Bitiş Tarihi</label>
    <input id="bitisTarihi" type="date" class="form-control" [(ngModel)]="bitisTarihi">
  </div>
  <div class="d-flex align-items-center gap-2">
    <button class="btn btn-primary" (click)="load()">Göster</button>
    <button class="btn btn-success ms-2" (click)="exportExcel()">
      <i class="bi bi-file-earmark-excel"></i> Excel
    </button>
      <ng-container *ngIf="showFasonCombo">
        <label class="ms-3 mb-0">Fason İsim:</label>
        <select class="form-select form-select-sm w-auto ms-2" [(ngModel)]="selectedFason" (change)="onFasonChange()">
          <option value="">Tümü</option>
          <option *ngFor="let f of fasonFirmalar" [value]="f">{{ f }}</option>
        </select>
      </ng-container>
  </div>
</div>

<div class="table-responsive">
  <table class="table table-sm table-hover align-middle">
    <thead class="table-light">
      <tr>
        <th>Tarih</th>
        <th>Ürün Grup Adı</th>
        <th class="text-end">Toplam Üretilen Miktar</th>
        <th class="text-end">Toplam Hakediş</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of rows">
        <td>{{ r.Tarih | date:'dd.MM.yyyy' }}</td>
        <td>{{ r.URUNGRUPADI ? r.URUNGRUPADI : '-' }}</td>
        <td class="text-end">{{ r.ToplamUretilenMiktar | number:'1.2-2' }}</td>
        <td class="text-end">{{ r.ToplamHakedis | number:'1.2-2' }}</td>
      </tr>
      <tr *ngIf="!rows.length && !busy">
        <td colspan="4" class="text-center text-muted">Kayıt yok</td>
      </tr>
      <tr *ngIf="!rows.length && !busy">
        <td colspan="4" class="text-center text-muted">Kayıt yok</td>
      </tr>
    </tbody>
  </table>
</div>
