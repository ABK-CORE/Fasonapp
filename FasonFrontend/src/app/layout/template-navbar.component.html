<nav class="navbar navbar-expand navbar-dark bg-dark px-3">
  <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/dashboard">
    <img src="{{environment.layoutLogoUrl}}" width="28" height="28" alt="logo">
    <span>{{ environment.layoutTitle }}
      <ng-container *ngIf="auth.isAuthenticated() && auth.currentUser">
        - {{ auth.currentUser.Username || 'Kullanıcı' }} - {{ auth.currentUser.CompanyName }}
      </ng-container>
    </span>
  </a>
  <ul class="navbar-nav ms-auto align-items-center">
  <!-- Profil bilgisi artık başlıkta gösteriliyor, bu alan kaldırıldı -->
    <li class="nav-item" *ngIf="!auth.isAuthenticated()">
      <a class="nav-link" routerLink="/login">Giriş</a>
    </li>
    <li class="nav-item" *ngIf="auth.isAuthenticated()">
      <a class="nav-link" (click)="logout()">Çıkış</a>
    </li>
  </ul>
</nav>
